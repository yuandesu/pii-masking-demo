services:

  # ── App A: WITH replace_tags masking ─────────────────────────────────────────
  app-masked:
    build: ./app
    container_name: pii-app-masked
    ports:
      - "3004:3000"
    environment:
      DD_AGENT_HOST: agent-masked
      DD_TRACE_AGENT_PORT: "8126"
      DD_SERVICE: admin-tool-masked
      DD_ENV: demo
      DD_VERSION: "1.0.0"
    depends_on:
      - agent-masked

  agent-masked:
    image: gcr.io/datadoghq/agent:latest
    container_name: pii-agent-masked
    environment:
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
      DD_CONTAINER_EXCLUDE: "name:pii-agent-masked"
    volumes:
      - ./datadog/datadog-masked.yaml:/etc/datadog-agent/datadog.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    ports:
      - "28126:8126/tcp"
      - "28125:8125/udp"

  # ── App B: WITHOUT masking (raw PII) ─────────────────────────────────────────
  app-raw:
    build: ./app
    container_name: pii-app-raw
    ports:
      - "3005:3000"
    environment:
      DD_AGENT_HOST: agent-raw
      DD_TRACE_AGENT_PORT: "8126"
      DD_SERVICE: admin-tool-raw
      DD_ENV: demo
      DD_VERSION: "1.0.0"
    depends_on:
      - agent-raw

  agent-raw:
    image: gcr.io/datadoghq/agent:latest
    container_name: pii-agent-raw
    environment:
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
      DD_CONTAINER_EXCLUDE: "name:pii-agent-raw"
    volumes:
      - ./datadog/datadog-raw.yaml:/etc/datadog-agent/datadog.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    ports:
      - "28127:8126/tcp"
      - "28128:8125/udp"
